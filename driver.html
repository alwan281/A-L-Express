<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A&L EXPRESS PANEL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --accent: #f59e0b;
            --success: #10b981;
            --info: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding-bottom: 30px; }
        header { background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%); padding: 40px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        header h1 { font-size: 24px; font-weight: 800; letter-spacing: 1px; }
        header h1 span { color: var(--accent); }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: -30px; margin-bottom: 25px; }
        .stat-box { background: var(--bg-card); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .stat-box small { font-size: 10px; font-weight: 800; opacity: 0.7; text-transform: uppercase; }
        .stat-box h2 { font-size: 18px; margin-top: 5px; color: var(--accent); }
        .tab-menu { display: flex; background: var(--bg-card); padding: 5px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; color: var(--text-muted); font-weight: 700; cursor: pointer; border-radius: 12px; font-size: 13px; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: #000; }
        .order-card { background: var(--bg-card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); animation: fadeInUp 0.4s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .order-header { display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center; }
        .status-pill { padding: 4px 12px; border-radius: 50px; font-size: 10px; font-weight: 800; color: white; text-transform: uppercase; }
        .info-row { display: flex; gap: 10px; margin-bottom: 8px; font-size: 14px; }
        .info-row i { color: var(--accent); width: 18px; text-align: center; margin-top: 3px; }
        .detail-box { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; margin: 15px 0; font-size: 13px; line-height: 1.6; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 16px; border-radius: 15px; border: none; font-weight: 800; font-size: 12px; cursor: pointer; text-decoration: none; text-align: center; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:active { transform: scale(0.95); }
        .btn-wa { background: var(--success); color: white; }
        .btn-action { background: #fff; color: #000; }
        .btn-finish { background: var(--info); color: white; }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--success); color: white; padding: 10px 25px; border-radius: 50px; font-weight: 800; display: none; z-index: 9999; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <header><h1>A&L EXPRESS <span>PANEL</span></h1></header>
    <div class="container">
        <!-- STATS -->
        <div class="stats-grid">
            <div class="stat-box"><small>Pendapatan</small><h2 id="stat-income">Rp 0</h2></div>
            <div class="stat-box"><small>Sukses</small><h2 id="stat-count">0 Order</h2></div>
        </div>

        <!-- TABS -->
        <div class="tab-menu">
            <button class="tab-btn active" onclick="switchTab('Menunggu Driver', this)">Baru</button>
            <button class="tab-btn" onclick="switchTab('Dalam Proses', this)">Proses</button>
            <button class="tab-btn" onclick="switchTab('Selesai', this)">Selesai</button>
        </div>

        <!-- LIST ORDER -->
        <div id="list-container"></div>
    </div>

    <div id="toast">Berhasil Diperbarui!</div>

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCGhsZw1wyy1OyqfUiH-bvYqln7fMZyiYg",
            authDomain: "jnt-jastip.firebaseapp.com",
            databaseURL: "https://jnt-jastip-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "jnt-jastip",
            storageBucket: "jnt-jastip.firebasestorage.app",
            messagingSenderId: "187685093180",
            appId: "1:187685093180:web:159e921771f2c8a5572839"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentTab = "Menunggu Driver";

        function switchTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            muatData();
        }

        function muatData() {
            const container = document.getElementById('list-container');
            database.ref('semua_pesanan').on('value', (snapshot) => {
                container.innerHTML = "";
                let income = 0; let totalSuccess = 0; let hasOrder = false;
                const data = snapshot.val();
                
                if (data) {
                    const sortedKeys = Object.keys(data).reverse();
                    sortedKeys.forEach(key => {
                        const order = data[key];
                        
                        if (order.status === "Selesai") {
                            totalSuccess++;
                            const nominal = parseInt(order.total_biaya.replace(/[^0-9]/g, '')) || 0;
                            income += nominal;
                        }

                        let show = false;
                        if (currentTab === "Menunggu Driver" && order.status === "Menunggu Driver") show = true;
                        if (currentTab === "Dalam Proses" && (order.status === "Pesanan Diproses Driver" || order.status === "Dalam Perjalanan")) show = true;
                        if (currentTab === "Selesai" && order.status === "Selesai") show = true;

                        if (show) {
                            hasOrder = true;
                            renderCard(key, order);
                        }
                    });
                }
                
                document.getElementById('stat-income').innerText = "Rp " + income.toLocaleString('id-ID');
                document.getElementById('stat-count').innerText = totalSuccess + " Order";
                if (!hasOrder) container.innerHTML = `<div style="text-align:center; padding:100px 20px; color:gray; font-size:14px;">Tidak ada pesanan di tab ini.</div>`;
            });
        }

        function renderCard(key, order) {
            const container = document.getElementById('list-container');
            
            // Render Items Proteksi Undefined
            let items = "";
            try {
                if (order.pesanan_detail) {
                    for(let iKey in order.pesanan_detail) {
                        const val = order.pesanan_detail[iKey];
                        if (typeof val === 'object' && val !== null) {
                            items += `<div>• ${val.nama || iKey} (x${val.qty || 1})</div>`;
                        } else {
                            items += `<div>• ${iKey} (x${val})</div>`;
                        }
                    }
                }
            } catch(e) { items = "Gagal memuat detail menu."; }

            // Format WhatsApp Dinamis
            const phone = order.hp ? (order.hp.startsWith('0') ? '62' + order.hp.slice(1) : order.hp) : '';
            const teksWA = `Halo Kak *${order.nama}*,\n` +
                           `Saya dari *A&L Express*, Mau konfirmasi pesanan dengan nomor resi *#${order.id}* ke alamat:\n` +
                           `*${order.alamat}*\n\n` +
                           `Totalnya *${order.total_biaya}*\n` +
                           `Mohon konfirmasinya ya, apakah benar pesanan ini milik Kakak?\n\n` +
                           `Terima kasih`;
            const waLink = `https://api.whatsapp.com/send?phone=${phone}&text=${encodeURIComponent(teksWA)}`;

            const card = document.createElement('div');
            card.className = "order-card";

            let actionBtn = "";
            if (order.status === "Menunggu Driver") {
                actionBtn = `<button class="btn btn-action" style="grid-column: span 2; background: var(--accent);" onclick="updateStatus('${key}', 'Pesanan Diproses Driver', this)">AMBIL PESANAN</button>`;
            } else if (order.status === "Pesanan Diproses Driver") {
                actionBtn = `<a href="${waLink}" target="_blank" class="btn btn-wa"><i class="fa-brands fa-whatsapp"></i> CHAT</a>
                             <button class="btn btn-action" onclick="updateStatus('${key}', 'Dalam Perjalanan', this)">MULAI KIRIM</button>`;
            } else if (order.status === "Dalam Perjalanan") {
                actionBtn = `<a href="${waLink}" target="_blank" class="btn btn-wa"><i class="fa-brands fa-whatsapp"></i> CHAT</a>
                             <button class="btn btn-finish" onclick="updateStatus('${key}', 'Selesai', this)">MARK SELESAI</button>`;
            } else {
                actionBtn = `<a href="${waLink}" target="_blank" class="btn btn-wa" style="grid-column: span 2"><i class="fa-brands fa-whatsapp"></i> HUBUNGI PELANGGAN</a>`;
            }

            card.innerHTML = `
                <div class="order-header">
                    <span style="font-size:11px; font-weight:800; color:var(--text-muted);">#${(order.id || key).substring(0,18)}</span>
                    <span class="status-pill" style="background:${getStatusCol(order.status)}">${order.status}</span>
                </div>
                <div class="info-row"><i class="fa-solid fa-user"></i> <b>${order.nama || 'Anonim'}</b></div>
                <div class="info-row"><i class="fa-solid fa-location-dot"></i> <span>${order.alamat || 'Alamat kosong'}</span></div>
                <div class="info-row" style="color:var(--accent)"><i class="fa-solid fa-comment"></i> <i>"${order.catatan || '-'}"</i></div>
                <div class="detail-box">${items}</div>
                <div style="display:flex; justify-content:space-between; font-weight:800; margin-bottom:15px; font-size:16px;">
                    <span>Total Tagihan:</span><span style="color:var(--accent)">${order.total_biaya || 'Rp 0'}</span>
                </div>
                <div class="btn-group">${actionBtn}</div>
            `;
            container.appendChild(card);
        }

        function updateStatus(keyResi, statusBaru, btnElement) {
            btnElement.disabled = true;
            btnElement.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i>`;
            database.ref('semua_pesanan/' + keyResi).update({ status: statusBaru })
            .then(() => {
                const toast = document.getElementById('toast');
                toast.style.display = 'block';
                setTimeout(() => { toast.style.display = 'none'; }, 2000);
            }).catch(err => {
                alert("Gagal: " + err.message);
                btnElement.disabled = false;
                btnElement.innerText = "COBA LAGI";
            });
        }

        function getStatusCol(s) {
            if(s === "Menunggu Driver") return "#ef4444";
            if(s === "Pesanan Diproses Driver") return "#3b82f6";
            if(s === "Dalam Perjalanan") return "#f59e0b";
            return "#10b981";
        }

        muatData();
    </script>
</body>
</html>
