<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A&L EXPRESS - Driver Panel</title>
    
    <meta name="theme-color" content="#0f172a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --accent: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --info: #3b82f6;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 40px;
        }

        header {
            background: linear-gradient(135deg, #1e1b4b 0%, #1e293b 100%);
            padding: 25px 20px;
            text-align: center;
            border-bottom: 2px solid rgba(245, 158, 11, 0.2);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h1 {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-main);
        }

        header h1 span { color: var(--accent); }

        .container {
            max-width: 768px;
            margin: 0 auto;
            padding: 15px;
        }

        /* DASHBOARD STATS */
        .driver-stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 15px;
            box-shadow: var(--shadow);
        }

        .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 5px; }
        .stat-value { font-size: 18px; font-weight: 800; }
        .stat-value.money { color: var(--accent); }
        .stat-value.count { color: var(--success); }

        /* TABS */
        .delivery-tabs {
            display: flex;
            background-color: var(--bg-card);
            padding: 6px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 12px 5px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            position: relative;
        }

        .tab-btn.active { background-color: var(--accent); color: #0f172a; }

        .order-badge {
            background-color: var(--danger);
            color: white;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 10px;
            font-weight: 800;
            display: none;
        }

        /* ORDER CARDS */
        .order-list { display: flex; flex-direction: column; gap: 15px; }
        .order-card {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 18px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.04);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-header { display: flex; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 10px; }
        .order-id { font-weight: 800; color: var(--accent); }
        .order-time { font-size: 11px; color: var(--text-muted); }

        .info-row { margin-bottom: 8px; }
        .info-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
        .info-value { font-weight: 600; font-size: 14px; margin-top: 2px; }
        .items-box { background: rgba(15,23,42,0.4); padding: 10px; border-radius: 8px; border-left: 3px solid var(--accent); font-size: 13px; }

        .btn-action {
            width: 100%; padding: 14px; border-radius: 10px; font-weight: 700; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 15px;
        }

        .btn-take { background-color: var(--accent); color: #0f172a; }
        .btn-ship { background-color: var(--info); color: white; }
        .btn-done { background-color: var(--success); color: white; }

        .btn-wa { background: none; border: 1px solid #10b981; color: #10b981; font-size: 11px; padding: 2px 8px; border-radius: 5px; margin-left: 8px; }

        .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }
    </style>
</head>
<body>

    <header>
        <h1>A&L EXPRESS <span>PANEL</span></h1>
    </header>

    <div class="container">
        
        <!-- DASHBOARD (RESTORED) -->
        <div class="driver-stats-grid">
            <div class="stat-card">
                <span class="stat-label">Pendapatan Hari Ini</span>
                <span class="stat-value money" id="total-pendapatan">Rp 0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Orderan Sukses</span>
                <span class="stat-value count" id="total-orderan-sukses">0 Order</span>
            </div>
        </div>
        
        <!-- TABS (RESTORED) -->
        <div class="delivery-tabs">
            <button class="tab-btn active" onclick="switchTab('baru', event)">
                <i class="fa-solid fa-inbox"></i> Baru
                <span class="order-badge" id="badge-baru">0</span>
            </button>
            <button class="tab-btn" onclick="switchTab('proses', event)">
                <i class="fa-solid fa-motorcycle"></i> Proses
            </button>
            <button class="tab-btn" onclick="switchTab('selesai', event)">
                <i class="fa-solid fa-check-double"></i> Selesai
            </button>
        </div>

        <div class="order-list" id="order-container">
            <div class="empty-state">Menghubungkan Database...</div>
        </div>

    </div>

    <audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-84.wav" preload="auto"></audio>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCGhsZw1wyy1OyqfUiH-bvYqln7fMZyiYg",
            authDomain: "jnt-jastip.firebaseapp.com",
            databaseURL: "https://jnt-jastip-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "jnt-jastip",
            storageBucket: "jnt-jastip.firebasestorage.app",
            messagingSenderId: "187685093180",
            appId: "1:187685093180:web:159e921771f2c8a5572839"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let localOrders = {}; 
        let currentActiveTab = 'baru'; 

        function isToday(timestamp) {
            if(!timestamp) return true;
            return new Date(timestamp).toDateString() === new Date().toDateString();
        }

        function listenDatabase() {
            database.ref('semua_pesanan').on('value', (snapshot) => {
                localOrders = snapshot.val() || {};
                hitungDashboard();
                renderCards();
            });
        }

        function hitungDashboard() {
            let income = 0;
            let successCount = 0;
            let totalNew = 0;

            for (const key in localOrders) {
                const order = localOrders[key];
                
                // Filter hanya data hari ini
                if (!isToday(order.timestamp)) continue;

                if (order.status === "Mencari Driver") totalNew++;

                if (order.status === "Selesai") {
                    successCount++;
                    // Parsing Rp 15.000 ke 15000
                    let price = parseInt(order.total_biaya.replace(/[^0-9]/g, '')) || 0;
                    income += price;
                }
            }

            document.getElementById('total-pendapatan').innerText = "Rp " + income.toLocaleString('id-ID');
            document.getElementById('total-orderan-sukses').innerText = successCount + " Order";

            const badge = document.getElementById('badge-baru');
            if(totalNew > 0) {
                if(parseInt(badge.innerText) < totalNew) document.getElementById('alertSound').play().catch(()=>{});
                badge.innerText = totalNew;
                badge.style.display = 'block';
            } else {
                badge.style.display = 'none';
            }
        }

        function renderCards() {
            const container = document.getElementById('order-container');
            container.innerHTML = '';
            let hasData = false;

            const sorted = Object.values(localOrders).reverse();

            sorted.forEach(order => {
                if (!isToday(order.timestamp)) return;

                let match = false;
                if (currentActiveTab === 'baru' && order.status === "Mencari Driver") match = true;
                if (currentActiveTab === 'proses' && (order.status === "Pesanan Diproses Driver" || order.status === "Dalam Perjalanan")) match = true;
                if (currentActiveTab === 'selesai' && order.status === "Selesai") match = true;

                if (!match) return;
                hasData = true;

                let items = order.pesanan_detail ? Object.entries(order.pesanan_detail).map(([n, q]) => `${q}x ${n}`).join(', ') : order.pesanan;

                let actionBtn = "";
                if (order.status === "Mencari Driver") actionBtn = `<button class="btn-action btn-take" onclick="updateStatus('${order.id}', 'Pesanan Diproses Driver')">Ambil Orderan</button>`;
                else if (order.status === "Pesanan Diproses Driver") actionBtn = `<button class="btn-action btn-ship" onclick="updateStatus('${order.id}', 'Dalam Perjalanan')">Mulai Antar</button>`;
                else if (order.status === "Dalam Perjalanan") actionBtn = `<button class="btn-action btn-done" onclick="updateStatus('${order.id}', 'Selesai')">Selesai / Sampai</button>`;

                container.innerHTML += `
                    <div class="order-card">
                        <div class="card-header"><span class="order-id">#${order.id}</span><span class="order-time">${order.waktu_order || ''}</span></div>
                        <div class="info-row"><div class="info-label">Penerima</div><div class="info-value">${order.nama} <button class="btn-wa" onclick="window.open('https://wa.me/62${order.hp.substring(1)}')">WA</button></div></div>
                        <div class="info-row"><div class="info-label">Alamat</div><div class="info-value">${order.alamat}</div></div>
                        <div class="info-row"><div class="info-label">Pesanan</div><div class="items-box">${items}</div></div>
                        <div class="info-row" style="display:flex; justify-content:space-between; align-items:center;">
                            <div><div class="info-label">Total</div><div class="stat-value count" style="font-size:16px">${order.total_biaya}</div></div>
                            <div style="text-align:right"><div class="info-label">Status</div><span style="font-size:11px; font-weight:800; color:var(--accent)">${order.status}</span></div>
                        </div>
                        ${actionBtn}
                    </div>
                `;
            });

            if(!hasData) container.innerHTML = '<div class="empty-state">Tidak ada orderan di tab ini.</div>';
        }

        function switchTab(tab, e) {
            currentActiveTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            e.currentTarget.classList.add('active');
            renderCards();
        }

        function updateStatus(id, stat) {
            database.ref('semua_pesanan/' + id).update({ status: stat });
        }

        window.onload = listenDatabase;
    </script>
</body>
</html>
