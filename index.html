    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --accent: #f59e0b;
            --accent-hover: #d97706;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 140px; 
            user-select: none; /* Mencegah seleksi teks agar terasa seperti aplikasi asli */
        }

        header {
            background: linear-gradient(135deg, #1e1b4b 0%, #1e293b 100%);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 2px solid rgba(245, 158, 11, 0.2);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-main);
            margin-bottom: 5px;
        }

        header h1 span {
            color: var(--accent);
        }

        header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .container {
            max-width: 1024px;
            margin: 0 auto;
            padding: 20px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            margin: 20px 0 15px 0;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* TAMPILAN MENU KOTAK (STYLE APK KONTER) */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        @media (max-width: 600px) {
            .category-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .category-box {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 20px 10px;
