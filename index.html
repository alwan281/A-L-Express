<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A&L EXPRESS - Multi Order v3</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --accent: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --info: #3b82f6;
            --danger: #ef4444;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-main); color: var(--text-main); padding-bottom: 50px; }

        header {
            background: linear-gradient(135deg, #1e1b4b 0%, #1e293b 100%);
            padding: 25px 20px; text-align: center; border-bottom: 3px solid var(--accent);
        }

        .container { max-width: 600px; margin: 0 auto; padding: 15px; }

        /* SEARCH BAR */
        .search-bar {
            background: var(--bg-card); display: flex; padding: 5px;
            border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1);
        }
        .search-bar input {
            flex: 1; background: none; border: none; padding: 10px 15px;
            color: white; outline: none; font-size: 14px;
        }
        .search-bar button {
            background: var(--info); border: none; color: white;
            padding: 10px 20px; border-radius: 12px; cursor: pointer;
        }

        /* GRID MENU */
        .category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .category-box {
            position: relative; background: var(--bg-card); padding: 20px 5px; 
            border-radius: 18px; text-align: center; cursor: pointer; 
            border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
            box-shadow: var(--shadow);
        }
        .category-box:active { transform: scale(0.95); background: var(--bg-input); }
        .category-box i { font-size: 28px; color: var(--accent); margin-bottom: 8px; display: block; }
        .category-box.box-pesanan i { color: var(--info); }
        .category-box span { font-weight: 700; font-size: 11px; }

        /* BADGE */
        .badge {
            position: absolute; top: -8px; right: -5px;
            background: var(--danger); color: white; width: 24px; height: 24px;
            border-radius: 50%; font-size: 12px; font-weight: 800;
            display: none; align-items: center; justify-content: center;
            border: 2px solid var(--bg-main); box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }

        /* MODAL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none;
            justify-content: center; align-items: flex-end; z-index: 999999;
        }
        .modal-content {
            background: var(--bg-card); width: 100%; max-width: 600px;
            padding: 25px; border-radius: 30px 30px 0 0;
            max-height: 85vh; overflow-y: auto; border-top: 5px solid var(--accent);
        }

        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .btn-add { background: var(--accent); color: #000; border: none; padding: 8px 18px; border-radius: 50px; font-weight: 800; cursor: pointer; }
        .counter { display: flex; align-items: center; gap: 12px; background: var(--bg-input); padding: 5px 12px; border-radius: 50px; }
        .btn-qty { background: none; border: none; color: white; font-size: 20px; font-weight: 800; cursor: pointer; width: 25px; }

        /* FORM & SUMMARY */
        .card { background: var(--bg-card); padding: 20px; border-radius: 20px; margin-top: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .input-style { width: 100%; background: var(--bg-input); border: 1px solid rgba(255,255,255,0.1); padding: 14px; border-radius: 12px; color: white; margin-bottom: 12px; outline: none; }
        .price-summary { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        .summary-row.total-bold { border-top: 1px dashed rgba(255,255,255,0.2); padding-top: 10px; margin-top: 10px; font-weight: 800; font-size: 16px; color: var(--accent); }
        .btn-order { width: 100%; background: var(--success); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 800; font-size: 16px; cursor: pointer; }

        /* ORDER LIST ITEMS */
        .order-card-item {
            background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; margin-bottom: 15px; border-left: 5px solid var(--info);
        }
        .status-pill { padding: 4px 12px; border-radius: 50px; font-size: 11px; font-weight: 800; color: white; text-transform: uppercase; }
        .btn-chat-wa {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: #25d366; color: white; text-decoration: none;
            padding: 14px; border-radius: 12px; font-weight: 800; font-size: 14px; margin-top: 15px;
            width: 100%; text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>A&L <span>EXPRESS</span></h1>
    </header>

    <div class="container">
        <!-- SEARCH -->
        <div class="search-bar">
            <input type="text" id="resi-search" placeholder="Cek No Resi Manual...">
            <button onclick="lacakResiManual()"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>

        <!-- GRID -->
        <div class="category-grid">
            <div class="category-box" onclick="bukaMenu('nasi-mie')">
                <i class="fa-solid fa-bowl-rice"></i><span>NASI & MIE</span>
            </div>
            <div class="category-box" onclick="bukaMenu('bakso')">
                <i class="fa-solid fa-bowl-food"></i><span>BAKSO ESOH</span>
            </div>
            <div class="category-box" onclick="bukaMenu('lalapan')">
                <i class="fa-solid fa-drumstick-bite"></i><span>LALAPAN</span>
            </div>
            <div class="category-box" onclick="bukaMenu('cemilan')">
                <i class="fa-solid fa-cookie"></i><span>DIMSUM</span>
            </div>
            <div class="category-box" onclick="bukaMenu('minuman')">
                <i class="fa-solid fa-glass-water"></i><span>MINUMAN</span>
            </div>
            <!-- KOTAK PESANAN DENGAN BADGE -->
            <div class="category-box box-pesanan" onclick="lihatDaftarPesanan()">
                <div class="badge" id="order-badge">0</div>
                <i class="fa-solid fa-receipt"></i><span>PESANAN</span>
            </div>
        </div>

        <!-- FORM -->
        <div class="card">
            <h3 style="margin-bottom: 15px; color: var(--accent); font-size: 15px;">Konfirmasi Pengiriman</h3>
            <form onsubmit="kirimKeDriver(event)">
                <input type="text" id="f-nama" class="input-style" placeholder="Nama Penerima" required>
                <input type="tel" id="f-hp" class="input-style" placeholder="Nomor WhatsApp" required>
                <textarea id="f-alamat" class="input-style" placeholder="Alamat & Patokan" style="height: 80px;" required></textarea>
                
                <div class="price-summary">
                    <div id="cart-preview" style="margin-bottom: 10px; font-size: 12px; color: var(--text-muted); text-align: center;">Keranjang Kosong</div>
                    <div class="summary-row"><span>Subtotal Menu</span><span id="sub-display">Rp 0</span></div>
                    <div class="summary-row"><span>Ongkir</span><span>Rp 5.000</span></div>
                    <div class="summary-row total-bold"><span>Total Bayar</span><span id="f-total">Rp 5.000</span></div>
                </div>

                <button type="submit" class="btn-order">PESAN SEKARANG</button>
            </form>
        </div>
    </div>

    <!-- MODAL MENU -->
    <div id="modalMenu" class="modal-overlay" onclick="tutupMenu()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="m-title" style="margin-bottom: 20px; font-size: 18px;">Pilih Menu</h2>
            <div id="m-list"></div>
            <button onclick="tutupMenu()" style="width: 100%; background: var(--info); color: white; border: none; padding: 15px; border-radius: 12px; margin-top: 20px; font-weight: 800;">SELESAI</button>
        </div>
    </div>

    <!-- MODAL LIST PESANAN -->
    <div id="modalPesanan" class="modal-overlay" onclick="tutupModalPesanan()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="margin-bottom: 20px; font-size: 18px; color: var(--info);">Daftar Pesanan Saya</h2>
            <div id="list-pesanan-container"></div>
            <button onclick="tutupModalPesanan()" style="width: 100%; background: var(--bg-input); color: white; border: none; padding: 15px; border-radius: 12px; margin-top: 10px; font-weight: 800;">KEMBALI</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCGhsZw1wyy1OyqfUiH-bvYqln7fMZyiYg",
            authDomain: "jnt-jastip.firebaseapp.com",
            databaseURL: "https://jnt-jastip-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "jnt-jastip",
            storageBucket: "jnt-jastip.firebasestorage.app",
            messagingSenderId: "187685093180",
            appId: "1:187685093180:web:159e921771f2c8a5572839"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const DRIVER_WA = "6281807151531";
        const ONGKIR = 5000;
        let keranjang = {};
        let myOrderIDs = JSON.parse(localStorage.getItem('my_orders')) || [];

        const dataMenu = {
            'nasi-mie': [{id:'n1', nama:'Nasi Goreng', harga:15000},{id:'n2', nama:'Mie Goreng', harga:13000}],
            'bakso': [{id:'b1', nama:'Bakso Urat', harga:15000},{id:'b2', nama:'Bakso Telur', harga:12000}],
            'lalapan': [{id:'l1', nama:'Ayam Goreng', harga:15000}],
            'cemilan': [{id:'c1', nama:'Dimsum Ayam', harga:12000}],
            'minuman': [{id:'m1', nama:'Es Teh', harga:3000},{id:'m2', nama:'Es Jeruk', harga:5000}]
        };

        window.onload = syncBadge;

        function bukaMenu(kat) {
            const list = document.getElementById('m-list');
            document.getElementById('m-title').innerText = kat.toUpperCase();
            list.innerHTML = '';
            dataMenu[kat].forEach(item => {
                const qty = keranjang[item.id] ? keranjang[item.id].qty : 0;
                list.innerHTML += `<div class="menu-item"><div><b>${item.nama}</b><br><small>Rp ${item.harga.toLocaleString()}</small></div><div id="target-${item.id}">${qty > 0 ? buatCounter(item.id, qty) : `<button class="btn-add" onclick="tambahKeCart('${item.id}','${item.nama}',${item.harga})">Tambah</button>`}</div></div>`;
            });
            document.getElementById('modalMenu').style.display = 'flex';
        }

        function buatCounter(id, qty) {
            return `<div class="counter"><button class="btn-qty" onclick="updateQty('${id}', -1)">-</button><b>${qty}</b><button class="btn-qty" onclick="updateQty('${id}', 1)">+</button></div>`;
        }

        function tambahKeCart(id, nama, harga) { keranjang[id] = { nama, harga, qty: 1 }; refreshUI(); bukaMenu(document.getElementById('m-title').innerText.toLowerCase().replace(/ /g, '-')); }

        function updateQty(id, delta) {
            if(keranjang[id]) {
                keranjang[id].qty += delta;
                if(keranjang[id].qty <= 0) delete keranjang[id];
                refreshUI();
                const activeTitle = document.getElementById('m-title').innerText.toLowerCase().replace(/ /g, '-');
                if(dataMenu[activeTitle]) bukaMenu(activeTitle);
            }
        }

        function refreshUI() {
            const preview = document.getElementById('cart-preview');
            let sub = 0; preview.innerHTML = '';
            for(let id in keranjang) {
                sub += keranjang[id].harga * keranjang[id].qty;
                preview.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px; color:white;"><span>${keranjang[id].nama} (x${keranjang[id].qty})</span><span>Rp ${(keranjang[id].harga*keranjang[id].qty).toLocaleString()}</span></div>`;
            }
            document.getElementById('sub-display').innerText = 'Rp ' + sub.toLocaleString();
            document.getElementById('f-total').innerText = 'Rp ' + (sub + ONGKIR).toLocaleString();
        }

        function kirimKeDriver(e) {
            e.preventDefault();
            if(Object.keys(keranjang).length === 0) return alert('Pilih menu dulu!');
            const resi = 'AL' + Math.floor(1000 + Math.random() * 9000);
            const nama = document.getElementById('f-nama').value;
            const hp = document.getElementById('f-hp').value;
            const alamat = document.getElementById('f-alamat').value;
            
            let sub = 0, detail = {};
            for(let id in keranjang) { sub += keranjang[id].harga * keranjang[id].qty; detail[keranjang[id].nama] = keranjang[id].qty; }

            const orderData = { 
                id: resi, nama, hp, alamat, pesanan_detail: detail, 
                total_biaya: "Rp " + (sub + ONGKIR).toLocaleString(), 
                status: "Mencari Driver", waktu_order: new Date().toLocaleTimeString() 
            };

            database.ref('semua_pesanan/' + resi).set(orderData).then(() => {
                if(!myOrderIDs.includes(resi)) myOrderIDs.push(resi);
                localStorage.setItem('my_orders', JSON.stringify(myOrderIDs));
                syncBadge();
                alert("Pesanan Berhasil! Cek menu PESANAN.");
                keranjang = {}; refreshUI(); e.target.reset();
            });
        }

        function syncBadge() {
            const badge = document.getElementById('order-badge');
            let activeCount = 0;
            if(myOrderIDs.length === 0) { badge.style.display="none"; return; }

            let promises = myOrderIDs.map(id => database.ref('semua_pesanan/' + id).once('value'));
            Promise.all(promises).then(snapshots => {
                snapshots.forEach(s => {
                    if(s.exists() && s.val().status !== "Selesai") activeCount++;
                });
                if(activeCount > 0) { badge.innerText = activeCount; badge.style.display = "flex"; }
                else badge.style.display = "none";
            });
        }

        function lihatDaftarPesanan() {
            const container = document.getElementById('list-pesanan-container');
            container.innerHTML = '';
            if(myOrderIDs.length === 0) container.innerHTML = '<p style="text-align:center;color:#94a3b8">Belum ada pesanan.</p>';

            [...myOrderIDs].reverse().forEach(resi => {
                database.ref('semua_pesanan/' + resi).on('value', snapshot => {
                    const data = snapshot.val();
                    if(!data) return;

                    let waItems = '';
                    for(let m in data.pesanan_detail) waItems += `- ${m} (x${data.pesanan_detail[m]})\n`;

                    const waMsg = `🚀 *A%26L EXPRESS - PESANAN*\n---------------------------\n📌 *RESI:* #${data.id}\n👤 *NAMA:* ${data.nama}\n📍 *ALAMAT:* ${data.alamat}\n🍱 *MENU:* \n${waItems}---------------------------\n💰 *TOTAL:* ${data.total_biaya}`;
                    
                    const card = document.createElement('div');
                    card.className = 'order-card-item';
                    card.innerHTML = `
                        <div style="display:flex;justify-content:space-between;margin-bottom:10px">
                            <b style="color:var(--accent)">#${data.id}</b>
                            <span class="status-pill" style="background:${getStatusCol(data.status)}">${data.status}</span>
                        </div>
                        <div style="font-size:13px; margin-bottom:10px">
                            <b>Penerima:</b> ${data.nama}<br>
                            <b style="color:var(--success)">Total: ${data.total_biaya}</b>
                        </div>
                        <a href="https://api.whatsapp.com/send?phone=${DRIVER_WA}&text=${encodeURIComponent(waMsg)}" 
                           target="_blank" rel="noopener" class="btn-chat-wa">
                            <i class="fa-brands fa-whatsapp"></i> Chat Driver Sekarang
                        </a>
                    `;
                    const exist = document.getElementById('card-' + data.id);
                    if(exist) exist.replaceWith(card); else { card.id = 'card-' + data.id; container.appendChild(card); }
                });
            });
            document.getElementById('modalPesanan').style.display = 'flex';
        }

        function getStatusCol(s) {
            if(s === "Pesanan Diproses Driver") return "#f59e0b";
            if(s === "Dalam Perjalanan") return "#10b981";
            if(s === "Selesai") return "#64748b";
            return "#3b82f6";
        }

        function lacakResiManual() {
            const r = document.getElementById('resi-search').value.toUpperCase().trim();
            if(!r) return;
            database.ref('semua_pesanan/' + r).once('value', s => {
                if(s.exists()) {
                    if(!myOrderIDs.includes(r)) { myOrderIDs.push(r); localStorage.setItem('my_orders', JSON.stringify(myOrderIDs)); }
                    lihatDaftarPesanan();
                } else alert("Resi tidak ditemukan.");
            });
        }

        function tutupMenu() { document.getElementById('modalMenu').style.display = 'none'; }
        function tutupModalPesanan() { document.getElementById('modalPesanan').style.display = 'none'; }
    </script>
</body>
</html>
